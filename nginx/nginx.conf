        location / {
            proxy_pass http://app3:8001;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $remote_addr;
        }
    }

    # -------- app4 --------
    server {
        listen 80;
        server_name app4;

        location / {
            proxy_pass http://app4:8001;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $remote_addr;
        }
    }
}
